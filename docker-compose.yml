services:
  postgres:
    image: postgres:16
    container_name: amw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: amw_db
      POSTGRES_USER: amw_user
      POSTGRES_PASSWORD: amw_password
    ports:
      - "5432:5432"
    volumes:
      - amw_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: amw_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@amw.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8081:80"
    depends_on:
      - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amw_app
    working_dir: /var/www/html
    volumes:
      - ./amw-backend:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    command: php artisan serve --host=0.0.0.0 --port=8000

volumes:
  amw_postgres_data:
